version: "3.9"

# ═══════════════════════════════════════════════════════════
#  Confluence AI Chatbot — Full Stack
#  Run: docker compose up --build
#
#  Services:
#    qdrant   → vector database (port 6333)
#    backend  → FastAPI AI engine (port 8000)
#    frontend → React chat UI (port 3000)
# ═══════════════════════════════════════════════════════════

services:

  # ── Vector Database ─────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: confluence-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── AI Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: confluence-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env          # ← customer fills this file
    environment:
      QDRANT_HOST: qdrant        # override localhost with container name
      QDRANT_PORT: 6333
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - model_cache:/root/.cache  # cache embedding model download
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: confluence-frontend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_data:      # persists vector DB data between restarts
  model_cache:      # caches embedding model (~90MB, saves re-download)
